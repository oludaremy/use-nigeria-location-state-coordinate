<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nigeria Location Coords Demo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map {
            height: 500px;
            border-radius: 8px;
        }
    </style>
</head>

<body class="bg-gray-50 p-8">
    <div id="root"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        // Mocking your library for the demo (Replace with actual import in a real project)
        const mockData = [
            { name: "Lagos", id: "lagos-123", latitude: 6.5244, longitude: 3.3792, capital: "Ikeja" },
            { name: "Abuja", id: "fct-456", latitude: 9.0765, longitude: 7.3986, capital: "Garki" },
            { name: "Kano", id: "kano-789", latitude: 12.0022, longitude: 8.5920, capital: "Kano" }
        ];

        function App() {
            const [selectedState, setSelectedState] = React.useState(null);
            const mapRef = React.useRef(null);

            React.useEffect(() => {
                // Initialize Map centered on Nigeria
                if (!mapRef.current) {
                    mapRef.current = L.map('map').setView([9.082, 8.6753], 6);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapRef.current);

                    // Add markers using your new coordinates
                    mockData.forEach(state => {
                        L.marker([state.latitude, state.longitude])
                            .addTo(mapRef.current)
                            .bindPopup(`<b>${state.name}</b>`)
                            .on('click', () => setSelectedState(state));
                    });
                }
            }, []);

            return (
                <div class="max-w-4xl mx-auto">
                    <header class="mb-8">
                        <h1 class="text-3xl font-bold text-blue-600">use-nigeria-location-state-coordinate</h1>
                        <p class="text-gray-600">Interactive Geo-Coordinate Demo</p>
                    </header>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-2">
                            <div id="map" class="shadow-lg"></div>
                        </div>

                        <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200">
                            <h2 class="font-bold text-xl mb-4">State Details</h2>
                            {selectedState ? (
                                <div class="space-y-2">
                                    <p><strong>Name:</strong> {selectedState.name}</p>
                                    <p><strong>Capital:</strong> {selectedState.capital}</p>
                                    <p class="text-blue-500"><strong>Lat:</strong> {selectedState.latitude}</p>
                                    <p class="text-blue-500"><strong>Long:</strong> {selectedState.longitude}</p>
                                </div>
                            ) : (
                                <p class="text-gray-400 italic">Click a marker on the map to see coordinates in action.</p>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
